server.port=8888
spring.application.name=gateway-service

# CORS Configuration
# CORS Configuration
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposed-headers=Authorization,X-Requested-With
# Eureka server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Activer la d�couverte automatique
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
 
# Route dynamique pour tout /auth/**
spring.cloud.gateway.routes[0].id=auth-route
spring.cloud.gateway.routes[0].uri=lb://authentification-module
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# Route pour Payslip-Module
spring.cloud.gateway.routes[1].id=payslip-route
spring.cloud.gateway.routes[1].uri=lb://payslip-module
spring.cloud.gateway.routes[1].predicates[0]=Path=/payslips/**

# Route vers employee-module
spring.cloud.gateway.routes[2].id=employee-route
spring.cloud.gateway.routes[2].uri=lb://employee-module
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/training-recommendation-plans/**,/api/career-pathing-plans/**,/answers/**,/year-evaluations/**,/api/employee-skill/**,/prediction/**,/channels/**,/results/**,/contract-types/**,/departments/**,/diplomas/**,/employee/**,/insurances/**,/nlp/**,/photos/**,/questions/**,/questionnaires/**,/survey-responses/**,/notifications/**
# Route vers leave-module
spring.cloud.gateway.routes[3].id=leave-route
spring.cloud.gateway.routes[3].uri=lb://leave-module
spring.cloud.gateway.routes[3].predicates[0]=Path=/conge/**,/historyleaves/**,/imputations/**,/leave-requests/**,/leaves/**,/leave-types/**,/manager-history/**,/rh-history/**,/api/workflows/**

# Route vers project-module
spring.cloud.gateway.routes[4].id=project-route
spring.cloud.gateway.routes[4].uri=lb://project-module
spring.cloud.gateway.routes[4].predicates[0]=Path=/clients/**,/comments/**,/phases/**,/projects/**,/tasks/**
# Route vers JobOffer-module
spring.cloud.gateway.routes[5].id=joboffer-module
spring.cloud.gateway.routes[5].uri=lb://JobOffer-Module
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/applications/**,/api/currencies/**,/api/diploma-type/**,/api/interviews/**,/joboffer/notifications/**,/api/offers/**,/api/resumes/**, /api/room/**, /api/site/**,/api/workflowjoboffer/**,/api/work-modes/**


# Route vers Resume-Module

spring.cloud.gateway.routes[6].id=resume-module
spring.cloud.gateway.routes[6].uri=lb://Resume-Module
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/resumes/**
# Ajoutez ceci pour le logging CORS
logging.level.org.springframework.web.cors=TRACE
logging.level.org.springframework.cloud.gateway.filter=DEBUG