      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [app-network]

  db-script:
    image: postgres:17
    profiles: ["seed"]
    depends_on:
      postgresql:
        condition: service_started
    environment:
      PGPASSWORD: admin
      PGHOST: postgresql
      PGUSER: postgres
      PGDATABASE: looyas-pfe
    volumes:
      - ./db-init:/db-init:ro
    entrypoint: >
      bash -lc '
        set -e
        echo "[db-seed] Waiting for Postgres...";
        until pg_isready -h "$$PGHOST" -U "$$PGUSER" -d "$$PGDATABASE" -q; do
          sleep 1;
        done
        echo "[db-seed] Postgres is ready.";
        shopt -s nullglob
        files=(/db-init/*)
        if [ $${#files[@]} -eq 0 ]; then
          echo "[db-seed] No files in /db-init, nothing to run."
          exit 0
        fi
        for f in /db-init/*; do
          echo "[db-seed] Running $${f}..."
          case "$${f}" in
            *.sql) psql -v ON_ERROR_STOP=1 -f "$${f}" ;;
            *.sh)  bash "$${f}" ;;
            *)     echo "[db-seed] Skipping (unknown type): $${f}" ;;
          esac
        done
        echo "[db-seed] Done."
      '
    networks: [app-network]  


  rabbitmq: 
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
